# ─────────────────────────────────────────────────────────────────────────────
# NGINX sidecar config — earlyread-saas Odoo pods
#
# Runs as a sidecar container alongside Odoo in every pod. Serves the React
# static bundles directly off a shared emptyDir volume (an initContainer copies
# the addon static/ trees there at pod start), and proxies everything else to
# Odoo on 127.0.0.1:8069. Frees Odoo's Python workers from static-file serving.
#
# Mounted into the nginx container at /etc/nginx/nginx.conf via a ConfigMap.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    # Odoo file uploads (logos, data imports).
    client_max_body_size 100m;

    # Temp paths under /tmp so nginx can run without writing to /var.
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    upstream odoo {
        server 127.0.0.1:8069;
    }
    upstream odoo_longpolling {
        server 127.0.0.1:8072;
    }

    server {
        listen 8080;
        server_name _;

        # ── Content-hashed Vite/Rollup chunks → immutable (1y) ───────────────
        # Hash suffix before the extension (base64-url-safe alphabet).
        location ~* "^/(posterra_portal/static/src/react|dashboard_builder/static/src/designer)/dist/.+-[A-Za-z0-9_-]{8,}\.(js|css)$" {
            root /usr/share/nginx/static;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            expires 1y;
            try_files $uri @odoo;
        }

        # ── Fixed-name dist assets (portal.js, designer.js, main.css) ────────
        # Short cache + must-revalidate so rolling deploys propagate.
        location ~* "^/(posterra_portal/static/src/react|dashboard_builder/static/src/designer)/dist/" {
            root /usr/share/nginx/static;
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
            expires 5m;
            try_files $uri @odoo;
        }

        # ── All other addon static assets ────────────────────────────────────
        location ~* "^/(posterra_portal|dashboard_builder)/static/" {
            root /usr/share/nginx/static;
            try_files $uri @odoo;
        }

        # ── Odoo websocket / longpolling ─────────────────────────────────────
        location /websocket {
            proxy_pass http://odoo_longpolling;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }
        location /longpolling {
            proxy_pass http://odoo_longpolling;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }

        # ── Everything else → Odoo ───────────────────────────────────────────
        location / {
            proxy_pass http://odoo;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
        }

        # Named fallback — static-file locations fall through here when the
        # file isn't on the shared volume (lets Odoo serve it instead of 404).
        location @odoo {
            proxy_pass http://odoo;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

# ExternalSecret — pulls the Azure Files storage account name + key from Key
# Vault into a K8s Secret named "azure-files-secret". The static
# PersistentVolume's csi.nodeStageSecretRef points at this Secret; the Azure
# Files CSI driver reads BOTH keys from it to mount the SMB share.
#
# The CSI driver requires these exact K8s secret key names:
#   azurestorageaccountname
#   azurestorageaccountkey
#
# In Key Vault:
#   filestore-account-name — the storage account name (non-secret; seeded by
#                            Terraform from var.filestore_storage_name)
#   filestore-account-key  — the storage account key (seeded as REPLACE_ME by
#                            Terraform; you set the real value via
#                            `az keyvault secret set` so it never lands in
#                            Terraform state)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: azure-files-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "posterra.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: azure-files-secret
    creationPolicy: Owner
  data:
    - secretKey: azurestorageaccountname
      remoteRef:
        key: filestore-account-name
    - secretKey: azurestorageaccountkey
      remoteRef:
        key: filestore-account-key

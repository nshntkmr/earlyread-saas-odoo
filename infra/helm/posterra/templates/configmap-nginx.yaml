apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "posterra.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "posterra.labels" . | nindent 4 }}
data:
  # nginx.conf is authored at infra/helm/posterra/files/nginx.conf and pulled
  # in here so the sidecar config lives in one place. Mounted into the nginx
  # container at /etc/nginx/nginx.conf.
  nginx.conf: |-
    {{- .Files.Get "files/nginx.conf" | nindent 4 }}

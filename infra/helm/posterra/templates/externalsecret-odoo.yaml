# ExternalSecret — pulls the Odoo app secrets from Key Vault (via the
# ClusterSecretStore that M3's services layer created) into a K8s Secret
# named "odoo-secrets". The pod env vars reference this Secret by key.
#
# Key names on the K8s side MUST match what the Phase 0 code reads:
#   POSTERRA_JWT_SECRET            — _get_jwt_secret()
#   POSTERRA_AI_API_KEY/ENDPOINT/MODEL — AiSqlGenerator
#   POSTERRA_CH_PASSWORD_PROD     — clickhouse._get_password() (the env var
#                                   named by connection.password_param_key)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: odoo-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "posterra.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: odoo-secrets
    creationPolicy: Owner
  data:
    - secretKey: PG_PASSWORD
      remoteRef:
        key: pg-admin-password
    - secretKey: ODOO_ADMIN_PASSWORD
      remoteRef:
        key: odoo-admin-password
    - secretKey: POSTERRA_JWT_SECRET
      remoteRef:
        key: jwt-secret
    - secretKey: POSTERRA_CH_PASSWORD_PROD
      remoteRef:
        key: ch-password-prod
    - secretKey: POSTERRA_AI_API_KEY
      remoteRef:
        key: ai-api-key
    - secretKey: POSTERRA_AI_ENDPOINT
      remoteRef:
        key: ai-endpoint
    - secretKey: POSTERRA_AI_MODEL
      remoteRef:
        key: ai-model
